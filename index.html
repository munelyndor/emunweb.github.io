<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Elyndor MUN</title>
  <link rel="icon" type="image/png" href="logos/mainlogo.png">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
      radial-gradient(circle at center,
      rgba(152,181,196,0.14) 0%,
      rgba(4,18,98,0.05) 25%,
      transparent 60%),

      linear-gradient(
      180deg,
      #02081f 0%,
      #041262 35%,
      #061a78 65%,
      #02081f 100%
      );

      position:relative;

      font-family:"Montserrat", sans-serif;
    }

    /* subtle stars */

    body::before{
      content:"";
      position:absolute;
      inset:0;

      background-image:
      radial-gradient(white 1px, transparent 1px);

      background-size:120px 120px;

      opacity:0.10;

      animation:float 12s linear infinite;
    }

    @keyframes float{

      from{
        transform:translateY(0px);
      }

      to{
        transform:translateY(-120px);
      }
    }

    /* center glow */

    .glow{
      position:absolute;

      width:750px;
      height:750px;

      border-radius:50%;

      background:radial-gradient(
      circle,
      rgba(182,204,215,0.20),
      rgba(132,161,175,0.08),
      transparent 72%
      );

      filter:blur(20px);

      z-index:0;
    }

    .container{
      position:relative;
      z-index:2;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      text-align:center;

      padding:20px;

      transform:translateY(-35px);
    }

    /* logo */

    .logo{
      width:360px;

      margin-bottom:30px;

      filter:
      drop-shadow(0 0 14px rgba(182,204,215,0.35))
      drop-shadow(0 0 40px rgba(182,204,215,0.15));

      animation:logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-8px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* main title */

    h1{
      font-family:"Cinzel", serif;

      font-size:4.2rem;
      font-weight:600;

      letter-spacing:5px;

      color:#eef6fb;

      text-transform:uppercase;

      text-shadow:
      0 0 10px rgba(182,204,215,0.35),
      0 0 25px rgba(182,204,215,0.18);

      margin-bottom:18px;
    }

    /* edition */

    .edition{
      display:flex;
      align-items:center;
      gap:18px;

      margin-bottom:42px;

      color:#b6ccd7;

      letter-spacing:8px;

      font-size:0.85rem;

      text-transform:uppercase;
    }

    .edition::before,
    .edition::after{
      content:"";

      width:110px;
      height:1px;

      background:rgba(182,204,215,0.30);
    }

    /* coming soon */

    .coming{
      font-family:"Cinzel", serif;

      font-size:3.7rem;
      font-weight:500;

      letter-spacing:6px;

      color:#dceaf2;

      text-transform:uppercase;

      text-shadow:
      0 0 12px rgba(182,204,215,0.25),
      0 0 30px rgba(182,204,215,0.10);

      position:relative;
    }

    .coming::after{
      content:"";

      position:absolute;

      left:50%;
      transform:translateX(-50%);

      bottom:-22px;

      width:220px;
      height:2px;

      background:linear-gradient(
      90deg,
      transparent,
      #b6ccd7,
      transparent
      );

      box-shadow:
      0 0 10px rgba(182,204,215,0.4);
    }

    /* responsive */

    @media(max-width:900px){

      .container{
        transform:translateY(-15px);
      }

      .logo{
        width:220px;
        margin-bottom:24px;
      }

      h1{
        font-size:2.8rem;
        letter-spacing:3px;
      }

      .edition{
        font-size:0.7rem;
        letter-spacing:4px;

        gap:10px;

        margin-bottom:32px;
      }

      .edition::before,
      .edition::after{
        width:45px;
      }

      .coming{
        font-size:2.2rem;
        letter-spacing:3px;
      }

      .coming::after{
        width:120px;
      }
    }

  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">

    <!-- replace with your logo -->
    <img src="logos/mainlogo.png" class="logo">

    <h1>ELYNDOR MUN</h1>

    <div class="edition">
      FIRST EDITION
    </div>

    <div class="coming">
      COMING SOON
    </div>

  </div>

</body>

</html>
